name: Deploy

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      only_readme: ${{ steps.only_readme.outputs.readme }}

    steps:
      - uses: actions/checkout@v4

      # Verifica se TODOS os arquivos alterados são README.md
      - id: only_readme
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            readme:
              - 'README.md'

  deploy:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}

          script: |
            set -e

            export NVM_DIR="/root/.nvm"
            export PATH="$NVM_DIR/versions/node/v24.18.0/bin:/root/.local/share/pnpm/bin:$PATH"

            cd /opt/portfolio/

            git pull origin main

            if [ "${{ needs.changes.outputs.only_readme }}" = "true" ]; then
              echo "Somente README.md foi alterado. Finalizando deploy."
              exit 0
            fi

            pnpm install --frozen-lockfile

            echo "Deploying WEB..."

            pnpm run build

            systemctl restart docker
            docker start portfolio-redis

            systemctl restart portfolio